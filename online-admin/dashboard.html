<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SIRILAND Online CMS Dashboard</title><link rel="stylesheet" href="css/app.css"></head><body><header class="topbar"><div><strong>SIRILAND Online CMS</strong><span id="userRoleBadge" class="role-badge">Loading</span></div><div class="top-actions"><span id="userEmail"></span><button class="btn secondary" id="logoutBtn">Çıkış</button></div></header><main class="app-shell"><aside class="sidebar"><button class="nav-btn active" data-view="dashboard">📊 Dashboard</button><button class="nav-btn" data-view="properties">🏠 İlanlar</button><button class="nav-btn" data-view="new-property">➕ Yeni İlan</button><button class="nav-btn manager-only" data-view="review">✅ Onay Bekleyenler</button><button class="nav-btn owner-only" data-view="team">👥 Ekip</button></aside><section class="workspace"><div id="view-dashboard" class="view active"><div class="view-head"><div><p class="eyebrow">ONLINE CMS</p><h1>Dashboard</h1></div><button class="btn primary" data-view-jump="new-property">Yeni İlan</button></div><div class="stats-grid"><div class="stat-card"><span>Toplam</span><strong id="statTotal">0</strong></div><div class="stat-card"><span>Draft</span><strong id="statDraft">0</strong></div><div class="stat-card"><span>Review</span><strong id="statReview">0</strong></div><div class="stat-card"><span>Approved</span><strong id="statApproved">0</strong></div><div class="stat-card"><span>Published</span><strong id="statPublished">0</strong></div></div><section class="panel"><h2>Son İlanlar</h2><div id="recentProperties" class="property-table"></div></section></div><div id="view-properties" class="view"><div class="view-head"><h1>İlanlar</h1><button class="btn primary" data-view-jump="new-property">Yeni İlan</button></div><div class="filter-row"><input id="propertySearch" placeholder="ID, başlık veya şehir ara"><select id="propertyStatusFilter"><option value="all">Tüm Durumlar</option><option value="draft">Draft</option><option value="review">Review</option><option value="approved">Approved</option><option value="published">Published</option><option value="rejected">Rejected</option></select></div><div id="propertyList" class="property-table"></div></div><div id="view-new-property" class="view"><div class="view-head"><h1>Yeni İlan</h1></div><form id="propertyForm" class="property-form"><input type="hidden" id="propertyId"><div><label>Şehir</label><select id="city" required><option value="">Seç</option><option>Chiang Mai</option><option>Bangkok</option><option>Phichit</option><option>Phitsanulok</option><option>Nakhon Sawan</option></select></div><div><label>Property Type</label><select id="propertyType" required><option value="">Seç</option><option>House</option><option>Condo</option><option>Land</option><option>Commercial</option><option>Shophouse</option><option>Office</option><option>Hotel</option><option>Resort</option><option>Warehouse</option><option>Factory</option><option>Farm</option></select></div><div><label>Deal</label><select id="deal" required><option value="">Seç</option><option>Sale</option><option>Rent</option><option>Sale/Rent</option></select></div><div><label>Fiyat</label><input id="price" required></div><div class="wide"><label>Başlık</label><input id="title" required></div><div><label>Yatak Odası</label><input id="bedrooms"></div><div><label>Banyo</label><input id="bathrooms"></div><div><label>Alan</label><input id="area"></div><div class="wide"><label>Google Maps URL</label><input id="mapUrl"></div><div class="wide"><label>Açıklama</label><textarea id="description" rows="8"></textarea></div><div class="wide workflow-actions"><button class="btn secondary" type="button" id="saveDraftBtn">Draft Kaydet</button><button class="btn primary" type="button" id="submitReviewBtn">Onaya Gönder</button></div></form><div id="propertyFormStatus" class="status-box">Hazır.</div></div><div id="view-review" class="view"><div class="view-head"><h1>Onay Bekleyen İlanlar</h1></div><div id="reviewList" class="property-table"></div></div><div id="view-team" class="view"><div class="view-head"><h1>Ekip ve Roller</h1></div><section class="panel"><p>Yeni kullanıcıları Supabase Authentication bölümünden ekle; ardından profiles tablosundaki rolü ayarla.</p><div id="teamList" class="property-table"></div></section></div></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/config.js"></script><script src="js/supabase-client.js"></script><script src="js/dashboard.js"></script></body></html>
