<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SIRILAND Sprint 4.3 Installer</title><style>body{margin:0;background:#f5f7fb;font-family:Arial;color:#172033}.box{max-width:780px;margin:50px auto;background:#fff;border:1px solid #d9deea;border-radius:22px;padding:26px;box-shadow:0 15px 45px rgba(7,26,61,.12)}h1{color:#071a3d}.gold{color:#b78917}.drop{border:2px dashed #d6ad4b;border-radius:18px;padding:30px;text-align:center;background:#fffaf0}button,label.btn{display:inline-block;border:0;border-radius:999px;padding:12px 18px;background:#071a3d;color:#fff;font-weight:800;cursor:pointer}button:disabled{opacity:.45}.ok{background:#e8f7ee;color:#0f7b3f;border-radius:12px;padding:12px;margin-top:14px;display:none}.warn{background:#fff4d8;color:#7c5700;border-radius:12px;padding:12px;margin-top:14px}code{background:#eef2f7;padding:2px 5px;border-radius:5px}</style></head><body><main class="box"><h1>🚀 SIRILAND <span class="gold">Sprint 4.3</span></h1><p>Bu kurucu Sprint 4.2 kurulu <b>admin.html</b> dosyanı okur ve GitHub Assistant eklenmiş yeni sürümü indirir.</p><div class="drop"><input id="file" type="file" accept=".html,text/html" hidden><label class="btn" for="file">1) admin.html Seç</label><p id="name">Henüz dosya seçilmedi</p><button id="install" disabled>2) Sprint 4.3 Kur ve İndir</button></div><div class="warn"><b>Yeni:</b> Commit Message, Files Changed, New/Updated/Deleted Listings, repository/branch ve Push Ready.</div><div class="ok" id="ok"></div></main><script>
const PATCH_CSS="/* SIRILAND Sprint 4.3 \u2014 GitHub Assistant */\n.gh43-panel{background:#fff;border:1px solid #d9deea;border-radius:20px;padding:18px;margin:0 0 18px;box-shadow:0 12px 30px rgba(7,26,61,.08)}.gh43-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.gh43-title{margin:0;color:#071a3d;font-size:22px}.gh43-sub{font-size:13px;color:#64748b;margin-top:4px}.gh43-badge{padding:8px 12px;border-radius:999px;background:#64748b;color:#fff;font-size:12px;font-weight:900}.gh43-badge.ready{background:#08783e}.gh43-badge.warn{background:#a16207}.gh43-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;margin-top:15px}.gh43-box{border:1px solid #e2e8f0;border-radius:16px;padding:14px;background:#f8fafc}.gh43-box h3{margin:0 0 10px;color:#071a3d;font-size:14px}.gh43-field{display:grid;grid-template-columns:120px 1fr;gap:8px;align-items:center;margin:8px 0}.gh43-field label{font-size:12px;font-weight:800;color:#475569}.gh43-field input,.gh43-field textarea{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:10px;padding:9px 10px;background:#fff;color:#172033}.gh43-field textarea{min-height:150px;resize:vertical;font:12px/1.5 monospace}.gh43-list{max-height:220px;overflow:auto;font-size:12px}.gh43-row{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px dashed #d9deea}.gh43-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px}.gh43-actions button{border:0;border-radius:999px;padding:9px 13px;font-weight:900;cursor:pointer;background:#071a3d;color:#fff}.gh43-actions .gold{background:#d6ad4b;color:#071a3d}.gh43-actions .soft{background:#e2e8f0;color:#172033}.gh43-note{font-size:12px;color:#64748b;margin-top:10px}.gh43-summary{white-space:pre-wrap;background:#0b1220;color:#dbeafe;border-radius:14px;padding:13px;max-height:260px;overflow:auto;font:12px/1.5 monospace}@media(max-width:900px){.gh43-grid{grid-template-columns:1fr}.gh43-field{grid-template-columns:1fr}}\n";
const PATCH_JS=";(() => {\n'use strict';\nconst KEY='siriland_github_assistant_43', SNAP='siriland_publish_snapshot_42', HIST='siriland_export_history_42';\nconst q=id=>document.getElementById(id), safe=(k,f)=>{try{return JSON.parse(localStorage.getItem(k)||'')||f}catch{return f}}, save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));\nconst getProps=()=>{try{if(typeof properties!=='undefined'&&Array.isArray(properties))return properties}catch{}return Array.isArray(window.SIRILAND_PROPERTIES)?window.SIRILAND_PROPERTIES:[]};\nconst snapshot=list=>{const o={};list.forEach(p=>{if(!p?.id)return;const c=JSON.parse(JSON.stringify(p));delete c.updatedAt;o[p.id]=JSON.stringify(c)});return o};\nfunction changes(){const prev=safe(SNAP,{}),cur=snapshot(getProps()),added=[],updated=[],deleted=[];Object.keys(cur).forEach(id=>{if(!(id in prev))added.push(id);else if(prev[id]!==cur[id])updated.push(id)});Object.keys(prev).forEach(id=>{if(!(id in cur))deleted.push(id)});return{added,updated,deleted}}\nfunction files(){const base=['properties.js','properties.json','data/properties.json'];try{if(typeof customers!=='undefined'&&Array.isArray(customers))base.push('crm/customers.json')}catch{}base.push('publish/export-summary.json','publish/missing-data-report.json','publish/changes.json','UPLOAD_INSTRUCTIONS.txt');return base}\nfunction commit(c){const total=c.added.length+c.updated.length+c.deleted.length;const lines=[total?'Update '+total+' property record'+(total===1?'':'s'):'Refresh property export','', '+ Added '+c.added.length+' listing'+(c.added.length===1?'':'s'),'~ Updated '+c.updated.length+' listing'+(c.updated.length===1?'':'s'),'- Deleted '+c.deleted.length+' listing'+(c.deleted.length===1?'':'s')];if(c.added.length)lines.push('','New: '+c.added.slice(0,20).join(', '));if(c.updated.length)lines.push('Updated: '+c.updated.slice(0,20).join(', '));if(c.deleted.length)lines.push('Deleted: '+c.deleted.slice(0,20).join(', '));return lines.join('\\n')}\nfunction inject(){if(q('gh43Panel'))return;const host=q('pm42Panel')||document.querySelector('.wrap');if(!host)return;const s=safe(KEY,{repository:'SIRILAND',branch:'main'}),el=document.createElement('section');el.id='gh43Panel';el.className='gh43-panel';el.innerHTML='<div class=\"gh43-head\"><div><h2 class=\"gh43-title\">\ud83d\udc19 GitHub Assistant</h2><div class=\"gh43-sub\">Sprint 4.3 \u00b7 Commit Message \u00b7 Files Changed \u00b7 Push Ready</div></div><div id=\"gh43Badge\" class=\"gh43-badge\">CHECKING</div></div><div class=\"gh43-grid\"><div class=\"gh43-box\"><h3>Commit & Repository</h3><div class=\"gh43-field\"><label>Repository</label><input id=\"gh43Repo\"></div><div class=\"gh43-field\"><label>Branch</label><input id=\"gh43Branch\"></div><div class=\"gh43-field\"><label>Commit Message</label><textarea id=\"gh43Commit\"></textarea></div><div class=\"gh43-actions\"><button id=\"gh43Generate\" class=\"gold\">Commit Haz\u0131rla</button><button id=\"gh43Copy\">Commit Kopyala</button><button id=\"gh43CopyAll\" class=\"soft\">T\u00fcm \u00d6zeti Kopyala</button></div><div class=\"gh43-note\">GitHub Desktop i\u00e7inde Summary alan\u0131na ilk sat\u0131r\u0131, Description alan\u0131na kalan sat\u0131rlar\u0131 yap\u0131\u015ft\u0131r.</div></div><div class=\"gh43-box\"><h3>Files Changed</h3><div id=\"gh43Files\" class=\"gh43-list\"></div><h3 style=\"margin-top:14px\">Listing Changes</h3><div id=\"gh43Changes\" class=\"gh43-list\"></div></div></div><div style=\"margin-top:14px\"><h3 style=\"color:#071a3d;font-size:14px\">Push Summary</h3><div id=\"gh43Summary\" class=\"gh43-summary\"></div></div>';host.insertAdjacentElement('afterend',el);q('gh43Repo').value=s.repository||'SIRILAND';q('gh43Branch').value=s.branch||'main';q('gh43Generate').onclick=refresh;q('gh43Copy').onclick=()=>copy(q('gh43Commit').value,'Commit message copied.');q('gh43CopyAll').onclick=()=>copy(q('gh43Summary').textContent,'GitHub summary copied.');['gh43Repo','gh43Branch'].forEach(id=>q(id).addEventListener('change',()=>save(KEY,{repository:q('gh43Repo').value.trim(),branch:q('gh43Branch').value.trim()})));refresh()}\nasync function copy(text,msg){try{await navigator.clipboard.writeText(text);alert(msg)}catch{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();alert(msg)}}\nfunction refresh(){if(!q('gh43Panel'))return;const c=changes(),f=files(),repo=q('gh43Repo').value.trim()||'SIRILAND',branch=q('gh43Branch').value.trim()||'main',history=safe(HIST,[]),last=history[0];q('gh43Commit').value=commit(c);q('gh43Files').innerHTML=f.map(x=>'<div class=\"gh43-row\"><b>'+x+'</b><span>CHANGED</span></div>').join('');q('gh43Changes').innerHTML=[['New Listings',c.added],['Updated Listings',c.updated],['Deleted Listings',c.deleted]].map(x=>'<div class=\"gh43-row\"><b>'+x[0]+'</b><span>'+x[1].length+(x[1].length?' \u00b7 '+x[1].slice(0,12).join(', '):'')+'</span></div>').join('');const ready=!!last&&Number(last.errors||0)===0,badge=q('gh43Badge');badge.textContent=ready?'PUSH READY':'EXPORT REQUIRED';badge.className='gh43-badge '+(ready?'ready':'warn');q('gh43Summary').textContent=['SIRILAND GITHUB ASSISTANT','Repository: '+repo,'Branch: '+branch,'Status: '+(ready?'PUSH READY':'RUN PUBLISH EXPORT FIRST'),last?'Export: '+last.version:'Export: None',last?'Quality: '+last.quality+'%':'Quality: \u2014','',q('gh43Commit').value,'','Files Changed ('+f.length+')',...f.map(x=>'\u2022 '+x)].join('\\n')}\nfunction boot(){inject();setInterval(refresh,5000)}\nif(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();\nwindow.SIRILAND_GITHUB_ASSISTANT={refresh,version:'4.3.0'};\n})();\n";
let source='';const f=document.getElementById('file'),btn=document.getElementById('install'),nameEl=document.getElementById('name'),ok=document.getElementById('ok');
f.onchange=async()=>{const file=f.files[0];if(!file)return;source=await file.text();nameEl.textContent=file.name+' · '+Math.round(file.size/1024)+' KB';btn.disabled=!source.includes('</body>');};
btn.onclick=()=>{if(!source)return;if(source.includes('SIRILAND Sprint 4.3 — GitHub Assistant')||source.includes('gh43Panel')){ok.style.display='block';ok.textContent='Bu dosyada Sprint 4.3 zaten kurulu.';return}if(!source.includes('pm42Panel')){ok.style.display='block';ok.textContent='Önce Sprint 4.2 kurulu admin.html dosyasını seçmelisin.';return}let html=source;html=html.replace('</head>','\n<style id="siriland-sprint-43-style">'+PATCH_CSS+'</style>\n</head>').replace('</body>','\n<script id="siriland-sprint-43-script">'+PATCH_JS+'<\/script>\n</body>');const blob=new Blob([html],{type:'text/html;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='admin-sprint-4.3.html';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),30000);ok.style.display='block';ok.innerHTML='<b>Tamamlandı.</b> İnen <code>admin-sprint-4.3.html</code> dosyasını test et; sonra adını <code>admin.html</code> yapıp eskisinin üzerine kopyala.';};
</script></body></html>
